twitter:
  search_terms:
    - Zepto
    - "@ZeptoNow"
    - "zepto delivery"
    - "zepto app"
    - "zepto categories"
  handles:
    - ZeptoNow
    - aadit_palicha
    - kaivalyavohra

# Tier-1 keyword pre-filter — only snippets containing at least one of these
# survive into the LLM classification tier. Keep this list broad; the LLM narrows.
relevance_keywords:
  # exploration / discovery signals
  - "only buy"
  - "only order"
  - "same items"
  - "same stuff"
  - "same things"
  - "never tried"
  - "never bought"
  - "new categor"
  - "new section"
  - "wish they had"
  - "wish they sold"
  - "wish zepto"
  - "do you have"
  - "do you sell"
  - "cant find"
  - "can't find"
  - "couldn't find"
  - "discover"
  - "explore"
  - "browse"
  - "other products"
  - "different products"
  - "categor"
  - "personal care"
  - "beauty"
  - "makeup"
  - "pet"
  - "baby"
  - "snacks"
  - "grocer"
  - "household"
  - "detergent"
  - "kirana"
  - "recommend"
  - "suggest"
  - "variety"
  - "selection"
  - "range"
  - "assortment"

# Operational-only complaints to *deprioritize* unless combined with a discovery keyword
noise_keywords:
  - "late delivery"
  - "delivery late"
  - "refund"
  - "app crash"
  - "not loading"
  - "coupon not working"
