brand: Zepto

app_ids:
  play_store: com.zeptoconsumerapp
  app_store:
    name: zepto-groceries-in-minutes
    id: 1575323645

# Competitor Play Store IDs — pulled as CONTROL group. Same barriers appearing
# across competitors → industry-wide problem. Barriers unique to Zepto →
# Zepto-specific opportunity.
competitor_play_store_ids:
  - id: com.grofers.customerapp
    brand: blinkit
  - id: com.bigbasket.mobileapp
    brand: bigbasket
  - id: in.swiggy.consumer
    brand: swiggy_instamart

# OPTIONAL: Zepto product-catalog scrapers seen in the Apify store. Using one
# of these gives us a "what Zepto actually sells" ground-truth table we can
# join against Unmet_Need signals — i.e. if 100 users ask "do you have pet
# food?" and the catalog says Zepto *does* carry it, that's a discovery UI
# problem, not an assortment gap. Wire in later if time permits.
zepto_catalog_actors_optional:
  - id: shahidirfan/zepto-product-scraper
    note: 5.0★ (4 reviews), 85 users
  - id: krazee_kaushik/zepto-scraper
    note: 5.0★, 120 users
  - id: smacient/zepto-data-extractor
    note: 45 users
  - id: archittjn/zepto-search-scraper
    note: "$0.9/1k, keyword-driven search"
  - id: archittjn/zepto-category-scraper
    note: "$0.9/1k, category-page listings"

reddit:
  subreddits:
    - Zepto
    - india
    - mumbai
    - bangalore
    - delhi
    - IndiaInvestments
    - IndianFood
    - IndiaSpeaks
    - AskIndia
    - IndianStreetBets
  # Brand-focused search — Zepto/competitors named directly
  search_terms:
    - Zepto
    - ZeptoNow
    - "Zepto app"
    - "Zepto order"
    - "Zepto delivery"
    - "Zepto vs Blinkit"
    - "Zepto vs Instamart"
    - "Zepto categories"
  # Deep-context search — no brand names; catches organic discussion of
  # habits, kirana loyalty, quick-commerce mental models, category exploration.
  # Post-hoc keyword filter will keep only those mentioning at least one QC brand.
  deep_search_terms:
    - "quick commerce india"
    - "10 minute delivery india"
    - "grocery app india"
    - "kirana vs online"
    - "grocery habits"
    - "monthly grocery shopping"
    - "online grocery"
    - "grocery delivery experience"
    - "grocery app comparison"
    - "instant delivery grocery"

