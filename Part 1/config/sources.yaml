  - id: nGpir4oUfJI    # WTF podcast — Aadit Palicha — 2.9M views
  - id: 7SC5w0Q7bzM    # LaunchX Application Video — Aadit Palicha — 291K views
  - id: Ye5z_nSyW9M    # Zepto Founders story — 225K views
  - id: YKZCU0ynEbs    # Zepto Two 17-Year-Olds — 166K views
  - id: fAR1GLGFQJ0    # Stanford dropout Aadit 60000 crore — 142K views
  - id: aYK0H85E_oU    # How Zepto Became India's Fastest Growing — 231K views
  - id: Drt-BwceCxc    # Rapid Fire with Aadit Palicha — 55K views
  # Quick-commerce ecosystem / comparison / critique
  - id: GuPT-BDzsHU    # Will Quick Commerce Be Profitable — 149K views
  - id: vC0p8AHIvKQ    # Quick Commerce CAN'T SURVIVE — 121K views
  - id: 5zGXUB1Il6A    # Honest Opinion On Quick Commerce — 98K views
