# News + business-blog articles with rich comment / discussion sections about
# Zepto and Indian quick commerce. The scraper pulls the article body (as
# context) + the comments section. Most Indian business media use Disqus,
# Facebook Comments, or native Vue/React comment widgets — the scraper handles
# raw HTML text extraction; where JS-rendered comments exist, we still capture
# the article text which itself contains reader mentality signal.
# We do NOT hardcode article URLs (they rot and are unpredictable). Instead
# the news scraper uses Google News RSS to discover real article URLs at run
# time for each query below, then scrapes each URL's paragraphs + comments.
news_queries:
  - "Zepto quick commerce"
  - "Zepto grocery delivery"
  - "Zepto vs Blinkit"
  - "Zepto vs Swiggy Instamart"
  - "Aadit Palicha Zepto"
  - "10 minute delivery India"
  - "quick commerce India profit"
  - "dark stores India"
  - "quick commerce user retention"
  - "Zepto app review"
  - "Zepto Cafe"
  - "Zepto Atom"

# Domains we prefer (others get lower priority / dropped)
